<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CARO PRO - ULTIMATE AI</title>
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; color: white;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
            min-height: 100vh;
        }
        h2 { text-shadow: 2px 2px 10px rgba(0,0,0,1); margin-top: 20px; }
        #controls { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; display: inline-block; margin: 10px; }
        button { padding: 8px 15px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; background: #00c6ff; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0072ff; transform: scale(1.05); }
        input { padding: 8px; border-radius: 6px; border: none; outline: none; }
        #board { display: grid; grid-template-columns: repeat(30, 22px); gap: 1px; justify-content: center; margin-top: 10px; background: #444; border: 2px solid #222; width: fit-content; margin-left: auto; margin-right: auto; }
        .cell { width: 22px; height: 22px; background: #2c3e50; line-height: 22px; cursor: pointer; font-size: 14px; font-weight: bold; border: 0.1px solid #34495e; }
        .cell:hover { background: #34495e; }
        .last { background: #f1c40f !important; color: black; }
        .win { background: #2ecc71 !important; }
        #history { margin-top: 10px; font-size: 13px; color: #ecf0f1; }
    </style>
</head>
<body>

<h2>🏖️ CARO PRO: NHÂN TUỆ TẠO</h2>

<div id="controls">
    <input id="name" placeholder="Nhập tên của bạn...">
    <button onclick="start()">Bắt đầu</button>
    <br>
    <button onclick="chooseMode('AI')">🤖 Đấu AI (Siêu khó)</button>
    <button onclick="chooseMode('2P')">👥 2 Người</button>
    <button onclick="reset()">🔄 Reset</button>
    <div id="history"></div>
</div>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE = 30;
let board = [], current = "X", mode = "", gameOver = false, last = null, player = "";
const boardDiv = document.getElementById("board");
const info = document.getElementById("info");
const historyDiv = document.getElementById("history");

// Khởi tạo danh sách người chơi từ LocalStorage
let recentPlayers = JSON.parse(localStorage.getItem("caro_players")) || [];

function updateHistoryUI() {
    historyDiv.innerHTML = "<b>Người chơi gần đây:</b> " + (recentPlayers.length ? recentPlayers.join(", ") : "Chưa có");
}

function savePlayer(name) {
    if (!name || recentPlayers.includes(name)) return;
    recentPlayers.unshift(name);
    if (recentPlayers.length > 5) recentPlayers.pop();
    localStorage.setItem("caro_players", JSON.stringify(recentPlayers));
    updateHistoryUI();
}

function start() {
    player = document.getElementById("name").value.trim() || "Người chơi";
    savePlayer(player);
    init();
}

function init() {
    board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    boardDiv.innerHTML = "";
    current = "X";
    gameOver = false;
    last = null;

    for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
            let cell = document.createElement("div");
            cell.className = "cell";
            cell.id = `c-${i}-${j}`;
            cell.onclick = () => move(i, j);
            boardDiv.appendChild(cell);
        }
    }
    updateInfo();
    updateHistoryUI();
}

function chooseMode(m) {
    mode = m;
    alert("Chế độ: " + (mode === "AI" ? "Đấu với AI siêu cấp" : "2 người chơi"));
    init();
}

function move(r, c) {
    if (board[r][c] !== "" || gameOver || !mode) return;

    board[r][c] = current;
    last = [r, c];
    updateUI();

    if (checkWin(r, c, current)) return end(current);

    if (mode === "2P") {
        current = current === "X" ? "O" : "X";
    } else {
        current = "O";
        updateInfo();
        setTimeout(aiThink, 100); 
    }
    updateInfo();
}

// AI LOGIC - MINIMAX WITH ALPHA-BETA PRUNING
function aiThink() {
    let bestScore = -Infinity;
    let move = null;

    // Chỉ tìm kiếm xung quanh các quân cờ đã có để tăng tốc (bán kính 2 ô)
    let candidates = getCandidates();
    
    for (let m of candidates) {
        board[m.r][m.c] = "O";
        let score = minimax(board, 2, -Infinity, Infinity, false);
        board[m.r][m.c] = "";
        if (score > bestScore) {
            bestScore = score;
            move = m;
        }
    }

    if (move) {
        board[move.r][move.c] = "O";
        last = [move.r, move.c];
        updateUI();
        if (checkWin(move.r, move.c, "O")) return end("O");
        current = "X";
        updateInfo();
    }
}

function getCandidates() {
    let cells = [];
    let visited = new Set();
    for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
            if (board[i][j] !== "") {
                for (let r = i - 2; r <= i + 2; r++) {
                    for (let c = j - 2; c <= j + 2; c++) {
                        if (r >= 0 && r < SIZE && c >= 0 && c < SIZE && board[r][c] === "" && !visited.has(`${r},${c}`)) {
                            cells.push({ r, c, score: evaluatePos(r, c) });
                            visited.add(`${r},${c}`);
                        }
                    }
                }
            }
        }
    }
    if (cells.length === 0) return [{ r: Math.floor(SIZE/2), c: Math.floor(SIZE/2) }];
    return cells.sort((a, b) => b.score - a.score).slice(0, 20); // Lấy 20 nước tiềm năng nhất
}

function minimax(node, depth, alpha, beta, isMaximizing) {
    if (depth === 0) return evaluateBoard();

    let candidates = getCandidates();
    if (isMaximizing) {
        let maxEval = -Infinity;
        for (let m of candidates) {
            node[m.r][m.c] = "O";
            let ev = minimax(node, depth - 1, alpha, beta, false);
            node[m.r][m.c] = "";
            maxEval = Math.max(maxEval, ev);
            alpha = Math.max(alpha, ev);
            if (beta <= alpha) break;
        }
        return maxEval;
    } else {
        let minEval = Infinity;
        for (let m of candidates) {
            node[m.r][m.c] = "X";
            let ev = minimax(node, depth - 1, alpha, beta, true);
            node[m.r][m.c] = "";
            minEval = Math.min(minEval, ev);
            beta = Math.min(beta, ev);
            if (beta <= alpha) break;
        }
        return minEval;
    }
}

function evaluatePos(r, c) {
    return score(r, c, "O") + score(r, c, "X");
}

function evaluateBoard() {
    // Đơn giản hóa để không lag: chỉ lấy điểm của nước đi cuối
    if (!last) return 0;
    return score(last[0], last[1], "O") - score(last[0], last[1], "X");
}

function score(r, c, p) {
    let dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
    let total = 0;
    for (let [dr, dc] of dirs) {
        let line = getLine(r, c, dr, dc, p);
        if (line >= 5) total += 100000;
        else if (line === 4) total += 5000;
        else if (line === 3) total += 500;
        else if (line === 2) total += 50;
    }
    return total;
}

function getLine(r, c, dr, dc, p) {
    let count = 1;
    for (let i = 1; i < 5; i++) {
        if (board[r + dr * i]?.[c + dc * i] === p) count++;
        else break;
    }
    for (let i = 1; i < 5; i++) {
        if (board[r - dr * i]?.[c - dc * i] === p) count++;
        else break;
    }
    return count;
}

function checkWin(r, c, p) {
    return score(r, c, p) >= 100000;
}

function updateUI() {
    if (last) {
        let prevLast = document.querySelector(".last");
        if (prevLast) prevLast.classList.remove("last");
        let cell = document.getElementById(`c-${last[0]}-${last[1]}`);
        cell.innerText = board[last[0]][last[1]];
        cell.classList.add("last");
        cell.style.color = board[last[0]][last[1]] === "X" ? "#ff4d4d" : "#2ecc71";
    }
}

function updateInfo() {
    info.innerHTML = `Lượt: <b>${current}</b> | Chế độ: ${mode || '...'} | Người chơi: ${player}`;
}

function end(p) {
    gameOver = true;
    let msg = (mode === "AI" && p === "O") ? "AI đã chiến thắng bạn!" : `Chúc mừng ${player} (Quân ${p}) đã thắng!`;
    setTimeout(() => alert(msg), 100);
}

function reset() { init(); }

updateHistoryUI();
</script>
</body>
</html>
