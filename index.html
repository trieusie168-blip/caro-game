<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO FIXED AI</title>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Arial;
    color:white;
    background:#111;
}
#board{
    display:grid;
    grid-template-columns:repeat(20,24px);
    gap:2px;
    justify-content:center;
    margin-top:10px;
}
.cell{
    width:24px;height:24px;
    background:#333;
    cursor:pointer;
    line-height:24px;
    font-size:14px;
}
.cell:hover{background:#555;}
.hidden{display:none;}
button{margin:5px;}
</style>
</head>

<body>

<h2>CARO FIXED AI</h2>

<div id="step1">
<input id="name" placeholder="Tên...">
<button onclick="nextStep()">Tiếp</button>
</div>

<div id="step2" class="hidden">
<button onclick="chooseMode('AI')">AI</button>
<button onclick="chooseMode('2P')">2 Người</button>
</div>

<div id="step3" class="hidden">
<button onclick="chooseSide('X')">Đi trước</button>
<button onclick="chooseSide('O')">Đi sau</button>
</div>

<button id="startBtn" class="hidden" onclick="startGame()">Start</button>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=20;

let board=[], current="X";
let playerSide="X", aiSide="O";
let mode="", gameOver=false, player="";

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");

// FIX DOM ELEMENTS
const step1=document.getElementById("step1");
const step2=document.getElementById("step2");
const step3=document.getElementById("step3");
const startBtn=document.getElementById("startBtn");

// ===== FLOW =====
function nextStep(){
    step1.classList.add("hidden");
    step2.classList.remove("hidden");
}

function chooseMode(m){
    mode=m;
    step2.classList.add("hidden");
    step3.classList.remove("hidden");
}

function chooseSide(s){
    playerSide=s;
    aiSide=(s==="X")?"O":"X";
    step3.classList.add("hidden");
    startBtn.classList.remove("hidden");
}

function startGame(){
    player=document.getElementById("name").value||"Player";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    gameOver=false;
    current="X";

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }

    updateInfo();

    // AI đi trước
    if(mode==="AI" && aiSide==="X"){
        let mid=Math.floor(SIZE/2);
        place(mid,mid,aiSide);
        current=playerSide;
    }
}

// ===== MOVE =====
function move(r,c){
    if(gameOver || board[r][c]!="") return;
    if(mode==="AI" && current!==playerSide) return;

    place(r,c,current);

    if(checkWin(r,c,current)) return end(current);

    current=(current==="X")?"O":"X";
    updateInfo();

    if(mode==="AI" && current===aiSide){
        setTimeout(aiMove,100);
    }
}

// ===== PLACE =====
function place(r,c,p){
    board[r][c]=p;
    updateUI();
}

// ===== AI (FIXED + KHÔNG TREO) =====
function aiMove(){
    let best=null;
    let bestScore=-Infinity;

    let moves=getCandidateMoves(); // 👈 FIX QUAN TRỌNG

    for(let m of moves){
        board[m.r][m.c]=aiSide;
        let score=evaluate();
        board[m.r][m.c]="";

        if(score>bestScore){
            bestScore=score;
            best=m;
        }
    }

    if(!best) return;

    place(best.r,best.c,aiSide);

    if(checkWin(best.r,best.c,aiSide)) return end(aiSide);

    current=playerSide;
    updateInfo();
}

// ===== CHỈ XÉT VÙNG GẦN QUÂN (FIX TREO) =====
function getCandidateMoves(){
    let list=[];

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                if(hasNeighbor(i,j)) list.push({r:i,c:j});
            }
        }
    }

    return list.length?list:[{r:10,c:10}];
}

function hasNeighbor(r,c){
    for(let i=-1;i<=1;i++){
        for(let j=-1;j<=1;j++){
            if(board[r+i]?.[c+j]) return true;
        }
    }
    return false;
}

// ===== EVALUATE =====
function evaluate(){
    return score(aiSide)-score(playerSide);
}

function score(p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===p){
                for(let [dr,dc] of dirs){
                    let count=1;
                    for(let k=1;k<5;k++){
                        if(board[i+dr*k]?.[j+dc*k]===p) count++;
                        else break;
                    }

                    if(count>=5) total+=100000;
                    else if(count===4) total+=10000;
                    else if(count===3) total+=1000;
                    else if(count===2) total+=100;
                }
            }
        }
    }
    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let count=1;

        for(let k=1;k<5;k++){
            if(board[r+dr*k]?.[c+dc*k]===p) count++;
            else break;
        }
        for(let k=1;k<5;k++){
            if(board[r-dr*k]?.[c-dc*k]===p) count++;
            else break;
        }

        if(count>=5) return true;
    }
    return false;
}

// ===== END =====
function end(p){
    gameOver=true;
    setTimeout(()=>{
        alert(p===playerSide?player+" thắng!":"AI thắng!");
    },100);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
    });
}

function updateInfo(){
    info.innerText=player+" | lượt: "+current;
}
</script>

</body>
</html>
