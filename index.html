<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO PRO MAX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}

h2{text-shadow:2px 2px 5px black;}

#controls{margin:10px;}

button{
    padding:6px 10px;
    margin:3px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#00c6ff;
}

input{padding:5px;border-radius:5px;border:none;}

#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:3px;
    justify-content:center;
}

.cell{
    width:22px;height:22px;
    background:rgba(0,0,0,0.6);
    line-height:22px;
    cursor:pointer;
}

.last{background:yellow !important;}
.win{background:lime !important;}
</style>
</head>

<body>

<h2>🏖️ CARO PRO MAX</h2>

<div id="controls">
<input id="name" placeholder="Tên người chơi">
<button onclick="start()">Bắt đầu</button>

<br>

<button onclick="setMode('AI')">🤖 AI</button>
<button onclick="setMode('2P')">👥 2 Người</button>

<button onclick="setLevel('easy')">😊</button>
<button onclick="setLevel('normal')">😐</button>
<button onclick="setLevel('hard')">😈</button>

<button onclick="reset()">🔄 Reset</button>
</div>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=30;
let board=[],current="X",mode="AI",difficulty="normal";
let gameOver=false,last=null,player="";

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");

// ===== START =====
function start(){
    player=document.getElementById("name").value||"Bạn";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    current="X";
    gameOver=false;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }
    updateInfo();
}

// ===== MODE =====
function setMode(m){mode=m;alert("Mode: "+m);}
function setLevel(lv){difficulty=lv;alert("Level: "+lv);}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!==""||gameOver) return;

    board[r][c]=current;
    last=[r,c];
    updateUI();

    if(checkWin(r,c,current)) return end(current);

    if(mode==="2P"){
        current=current==="X"?"O":"X";
        updateInfo();
    }else{
        if(current==="X"){
            current="O";
            updateInfo();
            setTimeout(aiMove,500);
        }
    }
}

// ===== AI =====
function aiMove(){

    // EASY
    if(difficulty==="easy"){
        let moves=getMoves();
        return placeAI(moves[Math.floor(Math.random()*moves.length)]);
    }

    // NORMAL
    if(difficulty==="normal"){
        let moves=getMoves();
        moves.sort((a,b)=>evaluate(b.r,b.c)-evaluate(a.r,a.c));
        let top=moves.slice(0,5);
        return placeAI(top[Math.floor(Math.random()*top.length)]);
    }

    // HARD = MINIMAX
    let best=minimax(2,true,-Infinity,Infinity);
    if(best.move) placeAI(best.move);
}

// ===== PLACE =====
function placeAI(m){
    board[m.r][m.c]="O";
    last=[m.r,m.c];
    updateUI();

    if(checkWin(m.r,m.c,"O")) return end("O");

    current="X";
    updateInfo();
}

// ===== MINIMAX =====
function minimax(depth,isMax,alpha,beta){
    if(depth===0) return {score:evaluateBoard()};

    let moves=getMoves();
    let bestMove=null;

    if(isMax){
        let max=-Infinity;
        for(let m of moves){
            board[m.r][m.c]="O";
            let score=minimax(depth-1,false,alpha,beta).score;
            board[m.r][m.c]="";

            if(score>max){max=score;bestMove=m;}
            alpha=Math.max(alpha,score);
            if(beta<=alpha) break;
        }
        return {score:max,move:bestMove};
    }else{
        let min=Infinity;
        for(let m of moves){
            board[m.r][m.c]="X";
            let score=minimax(depth-1,true,alpha,beta).score;
            board[m.r][m.c]="";

            if(score<min){min=score;bestMove=m;}
            beta=Math.min(beta,score);
            if(beta<=alpha) break;
        }
        return {score:min,move:bestMove};
    }
}

// ===== MOVE FILTER =====
function getMoves(){
    let moves=[];
    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]==="" && near(i,j)){
                moves.push({r:i,c:j});
            }
        }
    }
    return moves.length?moves:[{r:15,c:15}];
}

function near(r,c){
    for(let i=-2;i<=2;i++){
        for(let j=-2;j<=2;j++){
            if(board[r+i]?.[c+j]!="") return true;
        }
    }
    return false;
}

// ===== EVAL =====
function evaluateBoard(){
    return scoreAll("O")-scoreAll("X");
}

function scoreAll(p){
    let score=0;
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===p){
                for(let [dr,dc] of dirs){
                    let count=1;
                    for(let k=1;k<5;k++){
                        if(board[i+dr*k]?.[j+dc*k]===p) count++;
                        else break;
                    }
                    if(count>=5) score+=100000;
                    else if(count==4) score+=10000;
                    else if(count==3) score+=1000;
                    else if(count==2) score+=100;
                }
            }
        }
    }
    return score;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(let [dr,dc] of dirs){
        let count=1;
        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]===p) count++;
            else break;
        }
        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]===p) count++;
            else break;
        }
        if(count>=5) return true;
    }
    return false;
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
        cell.classList.remove("last");

        if(last && r==last[0] && c==last[1]){
            cell.classList.add("last");
        }
    });
}

function updateInfo(){
    info.innerText =
    "👤 "+player+
    " | Mode: "+mode+
    " | Level: "+difficulty+
    " | Lượt: "+current;
}

// ===== END =====
function end(p){
    gameOver=true;
    let msg = (mode==="AI")
        ? (p==="X"? player+" thắng!" : "AI thắng!")
        : p+" thắng!";
    setTimeout(()=>alert(msg),200);
}

// ===== RESET =====
function reset(){
    init();
}
</script>

</body>
</html>
