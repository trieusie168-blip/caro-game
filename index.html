<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO GOMOKU PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}
h2{text-shadow:2px 2px 5px black;}

#controls{margin:10px;}

button{
    padding:7px 12px;
    margin:4px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#00c6ff;
    font-weight:bold;
}

input{padding:6px;border-radius:6px;border:none;}

#levelBox{display:none;margin-top:10px;}

#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:3px;
    justify-content:center;
}

.cell{
    width:22px;height:22px;
    background:rgba(0,0,0,0.6);
    line-height:22px;
    cursor:pointer;
}

.last{background:yellow !important;}
.win{background:lime !important;}
</style>
</head>

<body>

<h2>🏖️ CARO GOMOKU PRO</h2>

<div id="controls">

<input id="name" placeholder="Nhập tên...">
<button onclick="start()">Bắt đầu</button>

<br>

<button onclick="chooseMode('AI')">🤖 Đấu AI</button>
<button onclick="chooseMode('2P')">👥 2 Người</button>

<div id="levelBox">
    <p>🎯 Chọn độ khó:</p>
    <button onclick="setLevel('easy')">😊 Dễ</button>
    <button onclick="setLevel('normal')">😐 Bình thường</button>
    <button onclick="setLevel('hard')">😈 Pro (Gomoku)</button>
</div>

<br>
<button onclick="reset()">🔄 Reset</button>

</div>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=30;
let board=[],current="X",mode="",difficulty="normal";
let gameOver=false,last=null,player="";

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");
const levelBox=document.getElementById("levelBox");

// ===== START =====
function start(){
    player=document.getElementById("name").value || "Người chơi";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    current="X";
    gameOver=false;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }
    updateInfo();
}

// ===== MODE =====
function chooseMode(m){
    mode=m;
    levelBox.style.display = (m==="AI") ? "block" : "none";
}

// ===== LEVEL =====
function setLevel(lv){
    difficulty=lv;
    alert("Độ khó: "+lv);
}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!=="" || gameOver || !mode) return;

    board[r][c]=current;
    last=[r,c];
    updateUI();

    if(checkWin(r,c,current)) return end(current);

    if(mode==="2P"){
        current = current==="X"?"O":"X";
        updateInfo();
    }
    else{
        if(current==="X"){
            current="O";
            updateInfo();
            setTimeout(aiMove,500);
        }
    }
}

// ===== AI =====
function aiMove(){

    let moves=getMoves();

    // 1. thắng ngay
    for(let m of moves){
        board[m.r][m.c]="O";
        if(checkWin(m.r,m.c,"O")){
            board[m.r][m.c]="";
            return placeAI(m);
        }
        board[m.r][m.c]="";
    }

    // 2. chặn ngay
    for(let m of moves){
        board[m.r][m.c]="X";
        if(checkWin(m.r,m.c,"X")){
            board[m.r][m.c]="";
            return placeAI(m);
        }
        board[m.r][m.c]="";
    }

    // 3. double threat (bẫy kép)
    for(let m of moves){
        let threats = countThreats(m.r,m.c,"O");
        if(threats>=2){
            return placeAI(m);
        }
    }

    // 4. tính điểm mạnh
    let best=null,max=-Infinity;

    for(let m of moves){
        let s = evaluatePro(m.r,m.c);
        if(s>max){
            max=s;
            best=m;
        }
    }

    placeAI(best);
}

// ===== DOUBLE THREAT =====
function countThreats(r,c,p){
    let count=0;
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let c1=1,open=0;

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) c1++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) c1++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        if(c1==3 && open==2) count++;
        if(c1==4 && open>=1) count++;
    }
    return count;
}

// ===== EVALUATE =====
function evaluatePro(r,c){
    return scorePro(r,c,"O")*2 + scorePro(r,c,"X")*3 + center(r,c);
}

function scorePro(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1,open=0;

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        if(count>=5) total+=1000000;
        else if(count==4 && open==2) total+=200000;
        else if(count==4) total+=50000;
        else if(count==3 && open==2) total+=20000;
        else if(count==3) total+=5000;
        else if(count==2) total+=1000;
    }
    return total;
}

function center(r,c){
    let m=SIZE/2;
    return 10-Math.abs(r-m)-Math.abs(c-m);
}

// ===== MOVE FILTER =====
function getMoves(){
    let arr=[];
    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]==="" && near(i,j)){
                arr.push({r:i,c:j});
            }
        }
    }
    return arr.length?arr:[{r:15,c:15}];
}

function near(r,c){
    for(let i=-2;i<=2;i++){
        for(let j=-2;j<=2;j++){
            if(board[r+i]?.[c+j]!="") return true;
        }
    }
    return false;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]===p) count++;
            else break;
        }
        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]===p) count++;
            else break;
        }

        if(count>=5) return true;
    }
    return false;
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
        cell.classList.remove("last");

        if(last && r==last[0] && c==last[1]){
            cell.classList.add("last");
        }
    });
}

function updateInfo(){
    info.innerText =
    "👤 "+player+
    " | Mode: "+(mode||"Chưa chọn")+
    " | Level: "+difficulty+
    " | Lượt: "+current;
}

// ===== END =====
function end(p){
    gameOver=true;

    let msg = (mode==="AI")
        ? (p==="X"? player+" thắng!" : "AI thắng!")
        : p+" thắng!";

    setTimeout(()=>alert(msg),200);
}

// ===== RESET =====
function reset(){
    init();
}
</script>

</body>
</html>
