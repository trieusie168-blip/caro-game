<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO FIX TURN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}
#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:2px;
    justify-content:center;
}
.cell{
    width:22px;height:22px;
    background:rgba(0,0,0,0.6);
    line-height:22px;
    cursor:pointer;
}
.cell:hover{background:#555;}
.last{background:yellow;}
.win{background:lime;}
.hidden{display:none;}
button{margin:5px;}
</style>
</head>

<body>

<h1>🤖 CARO FIX</h1>

<div id="step1">
<input id="name" placeholder="Tên...">
<button onclick="nextStep()">Tiếp</button>
</div>

<div id="step2" class="hidden">
<button onclick="chooseMode('AI')">AI</button>
<button onclick="chooseMode('2P')">2 Người</button>
</div>

<div id="step3" class="hidden">
<button onclick="chooseLevel('easy')">Dễ</button>
<button onclick="chooseLevel('normal')">BT</button>
<button onclick="chooseLevel('hard')">Khó</button>
</div>

<div id="step4" class="hidden">
<button onclick="chooseSide('X')">Đi trước</button>
<button onclick="chooseSide('O')">Đi sau</button>
</div>

<button id="startBtn" class="hidden" onclick="startGame()">Start</button>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=30;

let board=[],current="X",mode="",difficulty="",playerSide="X";
let last=null,gameOver=false,player="";

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");

// ===== UI =====
function nextStep(){
    step1.classList.add("hidden");
    step2.classList.remove("hidden");
}

function chooseMode(m){
    mode=m;
    step2.classList.add("hidden");

    if(mode==="AI") step3.classList.remove("hidden");
    else step4.classList.remove("hidden");
}

function chooseLevel(l){
    difficulty=l;
    step3.classList.add("hidden");
    step4.classList.remove("hidden");
}

function chooseSide(s){
    playerSide=s;
    step4.classList.add("hidden");
    startBtn.classList.remove("hidden");
}

// ===== START =====
function startGame(){
    player=document.getElementById("name").value||"Player";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    current="X";
    gameOver=false;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }

    updateInfo();

    // FIX CHÍNH Ở ĐÂY
    if(mode==="AI" && playerSide==="O"){
        setTimeout(()=>{
            let mid=Math.floor(SIZE/2);

            board[mid][mid]="X";
            last=[mid,mid];
            updateUI();

            current="O"; // 🔥 QUAN TRỌNG
            updateInfo();
        },300);
    }
}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!==""||gameOver) return;

    if(mode==="AI" && current!==playerSide) return;

    place(r,c,current);

    let win=checkWin(r,c,current);
    if(win) return end(win,current);

    if(mode==="2P"){
        current=current==="X"?"O":"X";
    }else{
        current="O";
        setTimeout(aiMove,300);
    }

    updateInfo();
}

// ===== PLACE =====
function place(r,c,p){
    board[r][c]=p;
    last=[r,c];
    updateUI();
}

// ===== AI =====
function aiMove(){
    if(gameOver) return;

    let moves=[];

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                moves.push({r:i,c:j,score:evaluate(i,j)});
            }
        }
    }

    moves.sort((a,b)=>b.score-a.score);

    let m=moves[0];

    place(m.r,m.c,"O");

    let win=checkWin(m.r,m.c,"O");
    if(win) return end(win,"O");

    current="X";
    updateInfo();
}

// ===== LOGIC =====
function evaluate(r,c){
    return score(r,c,"O")*2 + score(r,c,"X")*3;
}

function score(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]==p) count++;
            else break;
        }
        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]==p) count++;
            else break;
        }

        if(count>=5) total+=100000;
        else if(count==4) total+=10000;
        else if(count==3) total+=1000;
    }
    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]==p) count++;
            else break;
        }
        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]==p) count++;
            else break;
        }

        if(count>=5) return true;
    }
    return false;
}

// ===== END =====
function end(_,p){
    gameOver=true;
    setTimeout(()=>{
        alert(p===playerSide?player+" thắng!":"AI thắng!");
    },200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
    });
}

function updateInfo(){
    info.innerText=player+" | "+mode+" | "+difficulty+" | Lượt:"+current;
}
</script>

</body>
</html>
