<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO UPGRADED AI</title>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Arial;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}
#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:2px;
    justify-content:center;
}
.cell{
    width:22px;height:22px;
    background:rgba(0,0,0,0.6);
    cursor:pointer;
    line-height:22px;
    font-size:14px;
}
.cell:hover{background:#555;}
.hidden{display:none;}
button{margin:5px;}
</style>
</head>

<body>

<h2>🤖 CARO UPGRADED AI</h2>

<div id="step1">
<input id="name" placeholder="Tên...">
<button onclick="nextStep()">Tiếp</button>
</div>

<div id="step2" class="hidden">
<button onclick="chooseMode('AI')">AI</button>
<button onclick="chooseMode('2P')">2 Người</button>
</div>

<div id="step3" class="hidden">
<button onclick="chooseLevel('hard')">Khó</button>
</div>

<div id="step4" class="hidden">
<button onclick="chooseSide('X')">Đi trước</button>
<button onclick="chooseSide('O')">Đi sau</button>
</div>

<button id="startBtn" class="hidden" onclick="startGame()">Start</button>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=30;
let board=[], current="X";
let playerSide="X", aiSide="O";
let mode="", gameOver=false, player="";

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");

// ===== FLOW =====
function nextStep(){
    step1.classList.add("hidden");
    step2.classList.remove("hidden");
}

function chooseMode(m){
    mode=m;
    step2.classList.add("hidden");
    step3.classList.remove("hidden");
}

function chooseLevel(l){
    step3.classList.add("hidden");
    step4.classList.remove("hidden");
}

function chooseSide(s){
    playerSide=s;
    aiSide=(s==="X")?"O":"X";
    step4.classList.add("hidden");
    startBtn.classList.remove("hidden");
}

function startGame(){
    player=document.getElementById("name").value||"Player";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    gameOver=false;
    current="X";

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }

    updateInfo();
}

// ===== MOVE =====
function move(r,c){
    if(gameOver || board[r][c]!="") return;
    if(mode==="AI" && current!==playerSide) return;

    place(r,c,current);

    if(checkWin(r,c,current)) return end(current);

    current=(current==="X")?"O":"X";

    updateInfo();

    if(mode==="AI" && current===aiSide){
        setTimeout(aiMove,200);
    }
}

// ===== PLACE =====
function place(r,c,p){
    board[r][c]=p;
    updateUI();
}

// ===== AI MINIMAX (DEPTH 2) =====
function aiMove(){
    let bestScore=-Infinity;
    let move=null;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                board[i][j]=aiSide;
                let score=minimax(2,false);
                board[i][j]="";

                if(score>bestScore){
                    bestScore=score;
                    move={r:i,c:j};
                }
            }
        }
    }

    place(move.r,move.c,aiSide);

    if(checkWin(move.r,move.c,aiSide)) return end(aiSide);

    current=playerSide;
    updateInfo();
}

// ===== MINIMAX =====
function minimax(depth,isMax){
    if(depth===0) return evaluate();

    let winner=checkWinner();
    if(winner===aiSide) return 100000;
    if(winner===playerSide) return -100000;

    if(isMax){
        let best=-Infinity;
        for(let i=0;i<SIZE;i++){
            for(let j=0;j<SIZE;j++){
                if(board[i][j]===""){
                    board[i][j]=aiSide;
                    best=Math.max(best,minimax(depth-1,false));
                    board[i][j]="";
                }
            }
        }
        return best;
    }else{
        let best=Infinity;
        for(let i=0;i<SIZE;i++){
            for(let j=0;j<SIZE;j++){
                if(board[i][j]===""){
                    board[i][j]=playerSide;
                    best=Math.min(best,minimax(depth-1,true));
                    board[i][j]="";
                }
            }
        }
        return best;
    }
}

// ===== EVALUATE =====
function evaluate(){
    return score(aiSide)-score(playerSide);
}

function score(p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===p){
                for(let [dr,dc] of dirs){
                    let count=1;
                    for(let k=1;k<5;k++){
                        if(board[i+dr*k]?.[j+dc*k]===p) count++;
                        else break;
                    }
                    if(count>=5) total+=100000;
                    else if(count===4) total+=10000;
                    else if(count===3) total+=1000;
                    else if(count===2) total+=100;
                }
            }
        }
    }
    return total;
}

// ===== WIN CHECK =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(let [dr,dc] of dirs){
        let count=1;
        for(let k=1;k<5;k++){
            if(board[r+dr*k]?.[c+dc*k]===p) count++;
            else break;
        }
        for(let k=1;k<5;k++){
            if(board[r-dr*k]?.[c-dc*k]===p) count++;
            else break;
        }
        if(count>=5) return true;
    }
    return false;
}

// ===== CHECK WINNER =====
function checkWinner(){
    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j] && checkWin(i,j,board[i][j]))
                return board[i][j];
        }
    }
    return null;
}

// ===== END =====
function end(p){
    gameOver=true;
    setTimeout(()=>{
        alert(p===playerSide?player+" thắng!":"AI thắng!");
    },200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
    });
}

function updateInfo(){
    info.innerText=player+" | lượt: "+current;
}
</script>

</body>
</html>
