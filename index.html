<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO PRO - SMART AI</title>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    text-align:center;
    color:white;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}

#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:1px;
    justify-content:center;
}

.cell{
    width:22px;height:22px;
    background:#2c3e50;
    line-height:22px;
    cursor:pointer;
    font-size:14px;
}

.cell:hover{background:#34495e;}
.last{background:yellow !important;color:black;}

button{margin:5px;padding:6px;}
</style>
</head>

<body>

<h2>🤖 CARO AI THÔNG MINH</h2>

<input id="name" placeholder="Nhập tên">
<button onclick="start()">Start</button>
<br>

<button onclick="chooseMode('AI')">Đấu AI</button>
<button onclick="chooseMode('2P')">2 Người</button>
<button onclick="reset()">Reset</button>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=30;
let board=[],current="X",mode="",gameOver=false,last=null,player="";

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");

// ===== START =====
function start(){
    player=document.getElementById("name").value || "Người chơi";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    current="X";
    gameOver=false;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.id=`c-${i}-${j}`;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }
    updateInfo();
}

// ===== MODE =====
function chooseMode(m){
    mode=m;
    init();
}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!=="" || gameOver || !mode) return;

    place(r,c,current);

    if(checkWin(r,c,current)) return end(current);

    if(mode==="2P"){
        current=current==="X"?"O":"X";
    }else{
        current="O";
        updateInfo();
        setTimeout(aiMove,300);
    }
    updateInfo();
}

// ===== PLACE =====
function place(r,c,p){
    board[r][c]=p;
    last=[r,c];

    let cell=document.getElementById(`c-${r}-${c}`);
    cell.innerText=p;
    cell.classList.add("last");

    let prev=document.querySelector(".last:not(#c-"+r+"-"+c+")");
    if(prev) prev.classList.remove("last");
}

// ===== AI =====
function aiMove(){

    let moves=getCandidates();

    // thắng ngay
    for(let m of moves){
        board[m.r][m.c]="O";
        if(checkWin(m.r,m.c,"O")){
            board[m.r][m.c]="";
            return placeAI(m);
        }
        board[m.r][m.c]="";
    }

    // chặn ngay
    for(let m of moves){
        board[m.r][m.c]="X";
        if(checkWin(m.r,m.c,"X")){
            board[m.r][m.c]="";
            return placeAI(m);
        }
        board[m.r][m.c]="";
    }

    let best=null,max=-Infinity;

    for(let m of moves){
        let score=evaluate(m.r,m.c);
        if(score>max){
            max=score;
            best=m;
        }
    }

    placeAI(best);
}

function placeAI(m){
    place(m.r,m.c,"O");

    if(checkWin(m.r,m.c,"O")) return end("O");

    current="X";
    updateInfo();
}

// ===== EVALUATE =====
function evaluate(r,c){
    return score(r,c,"O")*2 + score(r,c,"X")*3;
}

function score(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1,open=0;

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        if(count>=5) total+=1000000;
        else if(count==4 && open==2) total+=200000;
        else if(count==4) total+=50000;
        else if(count==3 && open==2) total+=20000;
        else if(count==3) total+=5000;
        else if(count==2) total+=1000;
    }
    return total;
}

// ===== CANDIDATE =====
function getCandidates(){
    let arr=[];

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]==="" && near(i,j)){
                arr.push({r:i,c:j});
            }
        }
    }

    if(arr.length===0) return [{r:15,c:15}];
    return arr;
}

function near(r,c){
    for(let i=-2;i<=2;i++){
        for(let j=-2;j<=2;j++){
            if(board[r+i]?.[c+j]!="") return true;
        }
    }
    return false;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]===p) count++;
            else break;
        }
        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]===p) count++;
            else break;
        }

        if(count>=5) return true;
    }
    return false;
}

// ===== UI =====
function updateInfo(){
    info.innerText="Người chơi: "+player+" | Mode: "+mode+" | Lượt: "+current;
}

// ===== END =====
function end(p){
    gameOver=true;
    setTimeout(()=>alert((mode==="AI"&&p==="O")?"AI thắng!":player+" thắng!"),200);
}

// ===== RESET =====
function reset(){init();}
</script>

</body>
</html>
