<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CARO AI - BATTLE MODE</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: white;
            background: #1a1a1a url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
            background-attachment: fixed;
        }

        h1 { text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin: 20px 0; }

        .controls {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            display: inline-block;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(30, 22px);
            gap: 1px;
            justify-content: center;
            background: #444;
            padding: 2px;
            border: 2px solid #555;
            width: fit-content;
            margin: 0 auto 50px auto;
        }

        .cell {
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            font-weight: bold;
            font-size: 14px;
            line-height: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cell:hover { background: #ddd; }
        .cell.x-piece { color: #d32f2f; }
        .cell.o-piece { color: #1976d2; }
        .last { background: #fff176 !important; }
        .win { background: #4caf50 !important; color: white !important; }

        button {
            margin: 5px;
            padding: 8px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #2196f3;
            color: white;
            font-weight: bold;
        }
        button:hover { background: #1976d2; }
        input { padding: 7px; border-radius: 4px; border: none; }
        #info { margin: 10px; font-weight: bold; font-size: 1.1em; background: rgba(0,0,0,0.5); display: inline-block; padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<h1>🤖 CARO AI: TẤN CÔNG</h1>

<div class="controls">
    <input id="name" placeholder="Tên bạn..." maxlength="10">
    <button onclick="start()">Bắt đầu mới</button>
    <br>
    Mode: 
    <button onclick="setMode('AI')">Đấu với AI</button>
    <button onclick="setMode('2P')">2 Người</button>
    | Level:
    <button onclick="setLevel('easy')">Dễ</button>
    <button onclick="setLevel('normal')">Vừa</button>
    <button onclick="setLevel('hard')">Khó</button>
</div>

<br>
<div id="info">Vui lòng nhập tên và nhấn Start</div>
<div id="board"></div>

<script>
const SIZE = 30;
let board = [], current = "X", mode = "AI", difficulty = "hard";
let last = null, gameOver = false, player = "Người chơi";

const boardDiv = document.getElementById("board");
const info = document.getElementById("info");

function start() {
    player = document.getElementById("name").value || "Người chơi";
    init();
}

function init() {
    board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    boardDiv.innerHTML = "";
    current = "X";
    gameOver = false;
    last = null;

    for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
            let cell = document.createElement("div");
            cell.className = "cell";
            cell.id = `cell-${i}-${j}`;
            cell.onclick = () => move(i, j);
            boardDiv.appendChild(cell);
        }
    }
    updateInfo();
}

function move(r, c) {
    if (board[r][c] !== "" || gameOver) return;

    place(r, c, current);

    let win = checkWin(r, c, current);
    if (win) return end(win, current);

    if (mode === "2P") {
        current = current === "X" ? "O" : "X";
    } else {
        if (current === "X") {
            current = "O";
            updateInfo();
            setTimeout(aiMove, 200);
            return;
        }
    }
    updateInfo();
}

function place(r, c, p) {
    board[r][c] = p;
    last = [r, c];
    const cell = document.getElementById(`cell-${r}-${c}`);
    cell.innerText = p;
    cell.classList.add(p === "X" ? "x-piece" : "o-piece");
    
    // Cập nhật ô vừa đánh
    document.querySelectorAll(".cell").forEach(el => el.classList.remove("last"));
    cell.classList.add("last");
}

// ===== AI LOGIC (TẤN CÔNG MẠNH) =====
function aiMove() {
    let moves = [];
    for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
            if (board[i][j] === "") {
                if (hasNeighbor(i, j)) {
                    moves.push({ r: i, c: j, score: evaluate(i, j) });
                }
            }
        }
    }

    if (moves.length === 0) {
        // Nếu bàn cờ trống, đánh ở giữa
        if(board[15][15] === "") placeAI({r:15, c:15});
        return;
    }

    // 1. Thắng ngay nếu có thể
    for (let m of moves) {
        board[m.r][m.c] = "O";
        if (checkWin(m.r, m.c, "O")) {
            board[m.r][m.c] = "";
            return placeAI(m);
        }
        board[m.r][m.c] = "";
    }

    // 2. Chặn đối thủ nếu họ sắp thắng
    for (let m of moves) {
        board[m.r][m.c] = "X";
        if (checkWin(m.r, m.c, "X")) {
            board[m.r][m.c] = "";
            return placeAI(m);
        }
        board[m.r][m.c] = "";
    }

    moves.sort((a, b) => b.score - a.score);

    let choice;
    if (difficulty === "easy") choice = moves[Math.floor(Math.random() * Math.min(moves.length, 15))];
    else if (difficulty === "normal") choice = moves[Math.floor(Math.random() * Math.min(moves.length, 3))];
    else choice = moves[0];

    placeAI(choice);
}

function hasNeighbor(r, c) {
    for (let i = -2; i <= 2; i++) {
        for (let j = -2; j <= 2; j++) {
            if (board[r + i]?.[c + j] && board[r + i][c + j] !== "") return true;
        }
    }
    return false;
}

function evaluate(r, c) {
    // Ưu tiên O (AI) nhân 5, chặn X (Người) nhân 2 -> AI sẽ ham tấn công hơn
    return score(r, c, "O") * 5 + score(r, c, "X") * 2;
}

function score(r, c, p) {
    let dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
    let total = 0;

    for (let [dr, dc] of dirs) {
        let count = 1, open = 0;
        for (let i = 1; i < 5; i++) {
            let nr = r + dr * i, nc = c + dc * i;
            if (board[nr]?.[nc] === p) count++;
            else { if (board[nr]?.[nc] === "") open++; break; }
        }
        for (let i = 1; i < 5; i++) {
            let nr = r - dr * i, nc = c - dc * i;
            if (board[nr]?.[nc] === p) count++;
            else { if (board[nr]?.[nc] === "") open++; break; }
        }

        if (count >= 5) total += 10000000;
        else if (count === 4 && open === 2) total += 1000000;
        else if (count === 4 && open === 1) total += 100000;
        else if (count === 3 && open === 2) total += 50000;
        else if (count === 3 && open === 1) total += 5000;
        else if (count === 2 && open === 2) total += 1000;
    }
    return total;
}

function placeAI(m) {
    place(m.r, m.c, "O");
    let win = checkWin(m.r, m.c, "O");
    if (win) return end(win, "O");
    current = "X";
    updateInfo();
}

function checkWin(r, c, p) {
    let dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
    for (let [dr, dc] of dirs) {
        let cells = [[r, c]];
        for (let i = 1; i < 5; i++) {
            let nr = r + dr * i, nc = c + dc * i;
            if (board[nr]?.[nc] === p) cells.push([nr, nc]);
            else break;
        }
        for (let i = 1; i < 5; i++) {
            let nr = r - dr * i, nc = c - dc * i;
            if (board[nr]?.[nc] === p) cells.unshift([nr, nc]);
            else break;
        }
        if (cells.length >= 5) return cells;
    }
    return null;
}

function end(cells, p) {
    gameOver = true;
    cells.forEach(([r, c]) => {
        document.getElementById(`cell-${r}-${c}`).classList.add("win");
    });
    setTimeout(() => {
        alert(p === "O" ? "AI thắng rồi! Đừng buồn nhé." : "Chúc mừng! Bạn đã thắng AI.");
    }, 200);
}

function updateInfo() {
    info.innerText = `${player} (X) vs AI (O) | Lượt: ${current === "X" ? player : "AI"}`;
}

function setMode(m) { mode = m; init(); }
function setLevel(l) { difficulty = l; init(); }

// Tự động khởi chạy lần đầu
init();
</script>
</body>
</html>
