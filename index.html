<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO ULTIMATE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}

h1{text-shadow:2px 2px 5px black;}

#controls{margin:10px;}

input{
    padding:6px;
    border-radius:5px;
    border:none;
}

button{
    padding:7px 10px;
    margin:3px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#00c6ff;
    font-weight:bold;
}

#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:3px;
    justify-content:center;
}

.cell{
    width:22px;
    height:22px;
    background:rgba(0,0,0,0.6);
    border-radius:4px;
    line-height:22px;
    font-size:14px;
    cursor:pointer;
}

.cell:hover{background:#555;}

.last{background:yellow !important;}
.win{background:lime !important;}

#info{margin-top:10px;}
</style>
</head>

<body>

<h1>🏖️ CARO ULTIMATE</h1>

<div id="controls">
<input id="playerName" placeholder="Nhập tên..." />
<button onclick="startGame()">Bắt đầu</button>

<br>

<button onclick="setMode('AI')">🤖 AI</button>
<button onclick="setMode('2P')">👥 2 Người</button>

<br>

<button onclick="setLevel('easy')">😊 Dễ</button>
<button onclick="setLevel('normal')">😐 Bình thường</button>
<button onclick="setLevel('hard')">😈 Khó</button>

<br>

<button onclick="reset()">🔄 Reset</button>
</div>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=30;
let board=[],current="X",mode="AI",difficulty="normal";
let last=null,gameOver=false,player="";

const boardDiv=document.getElementById("board");
const infoDiv=document.getElementById("info");

// ===== START =====
function startGame(){
    player=document.getElementById("playerName").value || "Người chơi";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    current="X";
    gameOver=false;
    last=null;
    boardDiv.innerHTML="";

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }
    updateInfo();
}

// ===== MODE =====
function setMode(m){
    mode=m;
    alert("Mode: "+m);
}

function setLevel(lv){
    difficulty=lv;
    alert("Level: "+lv);
}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!==""||gameOver) return;

    board[r][c]=current;
    last=[r,c];
    updateUI();

    let win=checkWin(r,c,current);
    if(win) return endGame(win,current);

    if(mode==="2P"){
        current=current==="X"?"O":"X";
    }else{
        if(current==="X"){
            current="O";
            setTimeout(aiMove,100);
        }
    }
    updateInfo();
}

// ===== AI =====
function aiMove(){
    let moves=[];

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                let s=evaluate(i,j);
                moves.push({r:i,c:j,score:s});
            }
        }
    }

    if(difficulty==="easy"){
        let m=moves[Math.floor(Math.random()*moves.length)];
        return placeAI(m);
    }

    moves.sort((a,b)=>b.score-a.score);

    if(difficulty==="normal"){
        let top=moves.slice(0,5);
        let m=top[Math.floor(Math.random()*top.length)];
        return placeAI(m);
    }

    placeAI(moves[0]); // HARD
}

function placeAI(m){
    board[m.r][m.c]="O";
    last=[m.r,m.c];
    updateUI();

    let win=checkWin(m.r,m.c,"O");
    if(win) return endGame(win,"O");

    current="X";
    updateInfo();
}

// ===== AI LOGIC =====
function evaluate(r,c){
    return score(r,c,"O")*2 + score(r,c,"X")*2;
}

function score(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) count++;
            else break;
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) count++;
            else break;
        }

        if(count>=5) total+=100000;
        else if(count==4) total+=10000;
        else if(count==3) total+=1000;
        else if(count==2) total+=100;
    }

    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let cells=[[r,c]];

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) cells.push([nr,nc]); else break;
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) cells.unshift([nr,nc]); else break;
        }

        if(cells.length>=5) return cells;
    }
    return null;
}

// ===== END =====
function endGame(cells,p){
    gameOver=true;

    cells.forEach(([r,c])=>{
        document.querySelector(`.cell[data-r='${r}'][data-c='${c}']`)
        .classList.add("win");
    });

    let msg = (mode==="AI")
        ? (p==="X" ? player+" thắng!" : "AI thắng!")
        : p+" thắng!";

    setTimeout(()=>alert(msg),200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
        cell.classList.remove("last");

        if(last && r==last[0] && c==last[1]){
            cell.classList.add("last");
        }
    });
}

function updateInfo(){
    infoDiv.innerText =
        "👤 "+player+
        " | Mode: "+mode+
        " | Level: "+difficulty+
        " | Lượt: "+current;
}

// ===== RESET =====
function reset(){
    init();
}
</script>

</body>
</html>
