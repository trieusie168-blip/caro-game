<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO AI ONLINE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
}

h1 { margin-top: 10px; }

#controls { margin: 10px; }

input {
    padding: 8px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    background: #00c6ff;
    cursor: pointer;
    font-weight: bold;
}

#board {
    display: grid;
    grid-template-columns: repeat(15, 38px);
    gap: 4px;
    justify-content: center;
}

.cell {
    width: 38px;
    height: 38px;
    background: #222;
    border-radius: 5px;
    line-height: 38px;
    font-size: 22px;
    cursor: pointer;
}

.cell:hover { background: #444; }

.lastX { background: #ff4d4d !important; }
.lastO { background: #4da6ff !important; }
.win { background: gold !important; color: black; }

#playerList { margin-top: 10px; }
</style>
</head>

<body>

<h1>🎮 CARO AI ONLINE</h1>

<div id="controls">
    <input id="nameInput" placeholder="Nhập tên..." />
    <button onclick="startGame()">Bắt đầu</button>
    <button onclick="reset()">Chơi lại</button>
    <button onclick="toggleMusic()">🔊 Nhạc</button>
</div>

<div id="playerName"></div>
<div id="playerList"></div>
<div id="board"></div>

<!-- AUDIO -->
<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c0be91b44.mp3">
</audio>

<audio id="clickSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b64d2.mp3">
</audio>

<script>
const SIZE = 15;
let board = [];
let gameOver = false;
let lastMove = null;

const boardDiv = document.getElementById("board");
const bgm = document.getElementById("bgm");
const clickSound = document.getElementById("clickSound");

// ===== START =====
function startGame() {
    let name = document.getElementById("nameInput").value || "Người chơi";
    document.getElementById("playerName").innerText = "👤 " + name;

    savePlayer(name);

    bgm.muted = false;
    bgm.play().catch(()=>{});

    init();
}

// ===== INIT =====
function init() {
    board = Array(SIZE).fill().map(()=>Array(SIZE).fill(''));
    gameOver = false;
    lastMove = null;
    boardDiv.innerHTML = "";

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>playerMove(i,j);
            boardDiv.appendChild(cell);
        }
    }
}

// ===== PLAYER =====
function playerMove(r,c){
    if(board[r][c]!==''||gameOver) return;

    playSound();

    board[r][c]='X';
    lastMove=[r,c,'X'];
    updateUI();

    let win=checkWin(r,c,'X');
    if(win) return endGame(win,"Bạn thắng!");

    setTimeout(aiMove,200);
}

// ===== AI =====
function aiMove(){
    let best=-Infinity, move=null;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===''){
                let s=evaluate(i,j);
                if(s>best){best=s;move=[i,j];}
            }
        }
    }

    if(!move) return;

    playSound();

    let [r,c]=move;
    board[r][c]='O';
    lastMove=[r,c,'O'];

    updateUI();

    let win=checkWin(r,c,'O');
    if(win) endGame(win,"AI thắng!");
}

// ===== AI LOGIC =====
function evaluate(r,c){
    return score(r,c,'O')+score(r,c,'X')*2;
}

function score(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) count++; else break;
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) count++; else break;
        }

        if(count>=5) total+=100000;
        else if(count==4) total+=10000;
        else if(count==3) total+=1000;
        else if(count==2) total+=100;
    }

    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let cells=[[r,c]];

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) cells.push([nr,nc]); else break;
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) cells.unshift([nr,nc]); else break;
        }

        if(cells.length>=5) return cells;
    }
    return null;
}

function endGame(cells,msg){
    gameOver=true;

    cells.forEach(([r,c])=>{
        document.querySelector(`.cell[data-r='${r}'][data-c='${c}']`)
        .classList.add("win");
    });

    setTimeout(()=>alert(msg),200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
        cell.classList.remove("lastX","lastO");

        if(lastMove && r==lastMove[0] && c==lastMove[1]){
            cell.classList.add(lastMove[2]=='X'?"lastX":"lastO");
        }
    });
}

// ===== SOUND =====
function playSound(){
    clickSound.currentTime=0;
    clickSound.play();
}

function toggleMusic(){
    if(bgm.paused) bgm.play();
    else bgm.pause();
}

// ===== PLAYERS =====
function savePlayer(name){
    let list=JSON.parse(localStorage.getItem("players"))||[];

    if(!list.includes(name)){
        list.unshift(name);
        if(list.length>5) list.pop();
    }

    localStorage.setItem("players",JSON.stringify(list));
    showPlayers();
}

function showPlayers(){
    let list=JSON.parse(localStorage.getItem("players"))||[];

    let html="👥 Người chơi gần đây:<br>";
    list.forEach((p,i)=>{
        html+=`<span style="color:${i==0?'#00ffcc':'#fff'}">${i+1}. ${p}</span><br>`;
    });

    document.getElementById("playerList").innerHTML=html;
}

window.onload=showPlayers;

// ===== RESET =====
function reset(){ init(); }
</script>

</body>
</html>
