<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO STABLE FINAL</title>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Arial;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}
#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:2px;
    justify-content:center;
}
.cell{
    width:22px;height:22px;
    background:rgba(0,0,0,0.6);
    cursor:pointer;
    line-height:22px;
}
.cell:hover{background:#555;}
.hidden{display:none;}
button{margin:5px;}
.last{background:yellow;}
.win{background:lime;}
</style>
</head>

<body>

<h2>🤖 CARO FINAL (STABLE)</h2>

<div id="step1">
<input id="name" placeholder="Tên...">
<button onclick="nextStep()">Tiếp</button>
</div>

<div id="step2" class="hidden">
<button onclick="chooseMode('AI')">AI</button>
<button onclick="chooseMode('2P')">2 Người</button>
</div>

<div id="step3" class="hidden">
<button onclick="chooseLevel('easy')">Dễ</button>
<button onclick="chooseLevel('normal')">BT</button>
<button onclick="chooseLevel('hard')">Khó</button>
</div>

<div id="step4" class="hidden">
<button onclick="chooseSide('X')">Đi trước (X)</button>
<button onclick="chooseSide('O')">Đi sau (O)</button>
</div>

<button id="startBtn" class="hidden" onclick="startGame()">Start</button>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=30;

let board=[], current="X";
let playerSide="X", aiSide="O";
let mode="", difficulty="";
let gameOver=false, player="", last=null;

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");

// ===== UI FLOW =====
function nextStep(){
    step1.classList.add("hidden");
    step2.classList.remove("hidden");
}

function chooseMode(m){
    mode=m;
    step2.classList.add("hidden");
    if(m==="AI") step3.classList.remove("hidden");
    else step4.classList.remove("hidden");
}

function chooseLevel(l){
    difficulty=l;
    step3.classList.add("hidden");
    step4.classList.remove("hidden");
}

function chooseSide(s){
    playerSide=s;
    aiSide = (s==="X") ? "O" : "X";
    step4.classList.add("hidden");
    startBtn.classList.remove("hidden");
}

// ===== START =====
function startGame(){
    player=document.getElementById("name").value||"Player";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    gameOver=false;
    current="X";

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }

    updateInfo();

    // AI đi trước (nếu player chọn O)
    if(mode==="AI" && aiSide==="X"){
        setTimeout(()=>{
            let mid=Math.floor(SIZE/2);
            place(mid,mid,aiSide);
            current = playerSide; // trả lượt
            updateInfo();
        },300);
    }
}

// ===== MOVE =====
function move(r,c){
    if(gameOver) return;
    if(board[r][c] !== "") return;

    // chặn click sai lượt
    if(mode==="AI" && current !== playerSide) return;

    place(r,c,current);

    if(checkWin(r,c,current)) return end(current);

    if(mode==="2P"){
        current = (current==="X") ? "O" : "X";
    }else{
        current = aiSide;
        updateInfo();
        setTimeout(aiMove,300);
        return;
    }

    updateInfo();
}

// ===== PLACE =====
function place(r,c,p){
    board[r][c]=p;
    last=[r,c];
    updateUI();
}

// ===== AI =====
function aiMove(){
    if(gameOver) return;

    let moves=[];

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                moves.push({r:i,c:j,score:evaluate(i,j)});
            }
        }
    }

    if(moves.length===0) return;

    // thắng ngay
    for(let m of moves){
        board[m.r][m.c]=aiSide;
        if(checkWin(m.r,m.c,aiSide)){
            board[m.r][m.c]="";
            return placeAI(m);
        }
        board[m.r][m.c]="";
    }

    // chặn người
    for(let m of moves){
        board[m.r][m.c]=playerSide;
        if(checkWin(m.r,m.c,playerSide)){
            board[m.r][m.c]="";
            return placeAI(m);
        }
        board[m.r][m.c]="";
    }

    moves.sort((a,b)=>b.score-a.score);
    placeAI(moves[0]);
}

// ===== PLACE AI =====
function placeAI(m){
    place(m.r,m.c,aiSide);

    if(checkWin(m.r,m.c,aiSide)) return end(aiSide);

    current = playerSide;
    updateInfo();
}

// ===== AI LOGIC =====
function evaluate(r,c){
    return score(r,c,aiSide)*2 + score(r,c,playerSide)*3;
}

function score(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]==p) count++;
            else break;
        }
        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]==p) count++;
            else break;
        }

        if(count>=5) total+=100000;
        else if(count==4) total+=10000;
        else if(count==3) total+=1000;
    }
    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]==p) count++;
            else break;
        }
        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]==p) count++;
            else break;
        }

        if(count>=5) return true;
    }
    return false;
}

// ===== END =====
function end(p){
    gameOver=true;
    setTimeout(()=>{
        if(mode==="AI"){
            alert(p===playerSide ? player+" thắng!" : "AI thắng!");
        }else{
            alert(p+" thắng!");
        }
    },200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
    });
}

function updateInfo(){
    info.innerText =
        player+" | "+mode+
        " | Lượt:"+current+
        " | Bạn:"+playerSide;
}
</script>

</body>
</html>
