<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO PRO MAX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}

h1{margin-top:10px;text-shadow:2px 2px 5px black;}

#controls{margin:10px;}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    margin:3px;
    cursor:pointer;
    background:#00c6ff;
    font-weight:bold;
}

#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:3px;
    justify-content:center;
}

.cell{
    width:22px;
    height:22px;
    background:rgba(0,0,0,0.6);
    border-radius:4px;
    line-height:22px;
    font-size:14px;
    cursor:pointer;
}

.cell:hover{background:#444;}

.X{color:#ff4d4d;}
.O{color:#4da6ff;}

.last{background:yellow !important;color:black;}

.win{background:lime !important;color:black;}
</style>
</head>

<body>

<h1>🏖️ CARO PRO MAX</h1>

<div id="controls">
<button onclick="startAI()">🤖 Đấu AI</button>
<button onclick="start2P()">👥 2 Người</button>
<button onclick="reset()">🔄 Reset</button>
</div>

<div id="status"></div>
<div id="board"></div>

<script>
const SIZE=30;
let board=[],gameOver=false,mode="AI",current="X",last=null;

const boardDiv=document.getElementById("board");
const statusDiv=document.getElementById("status");

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    gameOver=false;
    current="X";
    last=null;
    boardDiv.innerHTML="";

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }

    updateStatus();
}

// ===== MODE =====
function startAI(){mode="AI";init();}
function start2P(){mode="2P";init();}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!==""||gameOver) return;

    board[r][c]=current;
    last=[r,c];
    updateUI();

    let win=checkWin(r,c,current);
    if(win) return endGame(win,current+" thắng!");

    if(mode==="2P"){
        current=current==="X"?"O":"X";
        updateStatus();
    }else{
        if(current==="X"){
            current="O";
            updateStatus();
            setTimeout(aiMove,100);
        }
    }
}

// ===== AI =====
function aiMove(){
    let best=-Infinity,move=null;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                let s=evaluate(i,j);
                if(s>best){best=s;move=[i,j];}
            }
        }
    }

    if(!move) return;

    let [r,c]=move;
    board[r][c]="O";
    last=[r,c];
    updateUI();

    let win=checkWin(r,c,"O");
    if(win) return endGame(win,"AI thắng!");

    current="X";
    updateStatus();
}

// ===== AI SMART =====
function evaluate(r,c){
    return score(r,c,"O")*2 + score(r,c,"X")*2 + centerScore(r,c);
}

function centerScore(r,c){
    let center=SIZE/2;
    return 10-Math.abs(r-center)-Math.abs(c-center);
}

function score(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1,open=0;

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        if(count>=5) total+=100000;
        else if(count==4&&open==2) total+=20000;
        else if(count==4) total+=10000;
        else if(count==3&&open==2) total+=5000;
        else if(count==3) total+=1000;
        else if(count==2) total+=200;
    }

    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let cells=[[r,c]];

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) cells.push([nr,nc]); else break;
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) cells.unshift([nr,nc]); else break;
        }

        if(cells.length>=5) return cells;
    }
    return null;
}

function endGame(cells,msg){
    gameOver=true;

    cells.forEach(([r,c])=>{
        document.querySelector(`.cell[data-r='${r}'][data-c='${c}']`)
        .classList.add("win");
    });

    setTimeout(()=>alert(msg),200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
        cell.classList.remove("last");

        if(last && r==last[0] && c==last[1]){
            cell.classList.add("last");
        }
    });
}

function updateStatus(){
    statusDiv.innerText="Lượt: "+current;
}

// ===== RESET =====
function reset(){init();}

// START
init();
</script>

</body>
</html>
