<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO STABLE+</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}

h2{text-shadow:2px 2px 5px black;}

button{
    padding:7px 12px;
    margin:4px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#00c6ff;
}

input{padding:6px;border-radius:6px;border:none;}

#levelBox{display:none;}

#board{
    display:grid;
    grid-template-columns:repeat(20,28px);
    gap:3px;
    justify-content:center;
}

.cell{
    width:28px;height:28px;
    background:rgba(0,0,0,0.6);
    line-height:28px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

.cell:hover{background:#555;}

.last{background:yellow !important;}
.win{background:lime !important;}

#score{margin-top:10px;}
</style>
</head>

<body>

<h2>🏖️ CARO STABLE+</h2>

<input id="name" placeholder="Nhập tên">
<button onclick="start()">Bắt đầu</button>

<br>

<button onclick="chooseMode('AI')">🤖 AI</button>
<button onclick="chooseMode('2P')">👥 2 Người</button>

<div id="levelBox">
    <p>Chọn độ khó:</p>
    <button onclick="setLevel('easy')">Dễ</button>
    <button onclick="setLevel('normal')">Bình thường</button>
    <button onclick="setLevel('hard')">Khó</button>
</div>

<br>
<button onclick="reset()">Reset</button>

<div id="info"></div>
<div id="score"></div>
<div id="board"></div>

<!-- SOUND -->
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b64d2.mp3"></audio>
<audio id="winSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_9f5c6c93b3.mp3"></audio>

<script>
const SIZE=20;

let board=[],current="X",mode="",difficulty="normal";
let player="Người chơi",gameOver=false,last=null;
let score={win:0,lose:0,draw:0};

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");
const levelBox=document.getElementById("levelBox");
const scoreDiv=document.getElementById("score");

const clickSound=document.getElementById("clickSound");
const winSound=document.getElementById("winSound");

// ===== START =====
function start(){
    player=document.getElementById("name").value || localStorage.getItem("player") || "Người chơi";
    localStorage.setItem("player",player);
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    current="X";
    gameOver=false;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }
    updateInfo();
    updateScore();
}

// ===== MODE =====
function chooseMode(m){
    mode=m;
    levelBox.style.display=(m==="AI")?"block":"none";
}

// ===== LEVEL =====
function setLevel(lv){difficulty=lv;}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!==""||gameOver||!mode) return;

    playClick();

    board[r][c]=current;
    last=[r,c];
    updateUI();

    let winCells=checkWin(r,c,current);
    if(winCells) return end(current,winCells);

    if(mode==="2P"){
        current=current==="X"?"O":"X";
        updateInfo();
    }else{
        if(current==="X"){
            current="O";
            updateInfo();
            setTimeout(aiMove,500);
        }
    }
}

// ===== AI =====
function aiMove(){
    let moves=[];
    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                moves.push({r:i,c:j,score:evaluate(i,j)});
            }
        }
    }

    if(difficulty==="easy"){
        return placeAI(random(moves));
    }

    moves.sort((a,b)=>b.score-a.score);

    if(difficulty==="normal"){
        let top=moves.slice(0,5);
        return placeAI(random(top));
    }

    return placeAI(moves[0]);
}

// ===== PLACE =====
function placeAI(m){
    playClick();
    board[m.r][m.c]="O";
    last=[m.r,m.c];
    updateUI();

    let winCells=checkWin(m.r,m.c,"O");
    if(winCells) return end("O",winCells);

    current="X";
    updateInfo();
}

// ===== AI LOGIC =====
function evaluate(r,c){
    return scoreLine(r,c,"O")*2 + scoreLine(r,c,"X")*3;
}

function scoreLine(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1;

        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]===p) count++;
            else break;
        }

        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]===p) count++;
            else break;
        }

        if(count>=5) total+=100000;
        else if(count==4) total+=10000;
        else if(count==3) total+=1000;
        else if(count==2) total+=100;
    }

    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let cells=[[r,c]];

        for(let i=1;i<5;i++){
            if(board[r+dr*i]?.[c+dc*i]===p) cells.push([r+dr*i,c+dc*i]);
            else break;
        }

        for(let i=1;i<5;i++){
            if(board[r-dr*i]?.[c-dc*i]===p) cells.unshift([r-dr*i,c-dc*i]);
            else break;
        }

        if(cells.length>=5) return cells;
    }
    return null;
}

// ===== END =====
function end(p,cells){
    gameOver=true;
    winSound.play();

    cells.forEach(([r,c])=>{
        document.querySelector(`.cell[data-r='${r}'][data-c='${c}']`).classList.add("win");
    });

    if(mode==="AI"){
        if(p==="X") score.win++;
        else score.lose++;
    }

    updateScore();

    let msg=(mode==="AI")?(p==="X"?player+" thắng!":"AI thắng!"):(p+" thắng!");
    setTimeout(()=>alert(msg),200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
        cell.classList.remove("last");

        if(last && r==last[0] && c==last[1]){
            cell.classList.add("last");
        }
    });
}

function updateInfo(){
    info.innerText=`${player} | Mode:${mode||"?"} | Level:${difficulty} | Lượt:${current}`;
}

function updateScore(){
    scoreDiv.innerText=`🏆 Thắng:${score.win} | Thua:${score.lose}`;
}

// ===== UTIL =====
function random(arr){return arr[Math.floor(Math.random()*arr.length)];}
function playClick(){clickSound.currentTime=0;clickSound.play();}

// ===== RESET =====
function reset(){init();}
</script>

</body>
</html>
