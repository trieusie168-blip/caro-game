<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO ULTIMATE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}

h1{text-shadow:2px 2px 5px black;}

#controls{margin:10px;}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    margin:3px;
    cursor:pointer;
    background:#00c6ff;
    font-weight:bold;
}

#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:3px;
    justify-content:center;
}

.cell{
    width:22px;
    height:22px;
    background:rgba(0,0,0,0.6);
    border-radius:4px;
    line-height:22px;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
}

.cell:hover{background:#555;}

.last{background:yellow !important;}
.win{
    background:lime !important;
    animation:blink 0.5s infinite alternate;
}

@keyframes blink{
    from{transform:scale(1);}
    to{transform:scale(1.2);}
}

#score{margin-top:10px;}
</style>
</head>

<body>

<h1>🏖️ CARO ULTIMATE</h1>

<div id="controls">
<button onclick="startAI()">🤖 AI</button>
<button onclick="start2P()">👥 2 Người</button>

<button onclick="setLevel('easy')">😊</button>
<button onclick="setLevel('normal')">😐</button>
<button onclick="setLevel('hard')">😈</button>

<button onclick="reset()">🔄</button>
</div>

<div id="status"></div>
<div id="score"></div>
<div id="board"></div>

<!-- SOUND -->
<audio id="sX" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b64d2.mp3"></audio>
<audio id="sO" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b64d2.mp3"></audio>
<audio id="winS" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_9f5c6c93b3.mp3"></audio>

<script>
const SIZE=30;
let board=[],mode="AI",current="X",last=null,gameOver=false;
let difficulty="normal";
let score={win:0,lose:0,draw:0};

const boardDiv=document.getElementById("board");
const statusDiv=document.getElementById("status");
const scoreDiv=document.getElementById("score");

const sX=document.getElementById("sX");
const sO=document.getElementById("sO");
const winS=document.getElementById("winS");

// ===== INIT =====
function init(){
    board=JSON.parse(localStorage.getItem("board"))||Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    current="X";
    gameOver=false;
    last=null;

    boardDiv.innerHTML="";

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }
    updateUI();
    updateStatus();
}

// ===== MODE =====
function startAI(){mode="AI";init();}
function start2P(){mode="2P";init();}
function setLevel(lv){difficulty=lv;alert("Level: "+lv);}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!==""||gameOver) return;

    playSound(current);

    board[r][c]=current;
    last=[r,c];
    saveGame();
    updateUI();

    let win=checkWin(r,c,current);
    if(win) return endGame(win,current);

    if(mode==="2P"){
        current=current==="X"?"O":"X";
    }else{
        if(current==="X"){
            current="O";
            setTimeout(aiMove,100);
        }
    }
    updateStatus();
}

// ===== AI =====
function aiMove(){
    let best=-Infinity,move=null;

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                let s=evaluate(i,j);

                if(difficulty==="easy") s=Math.random()*100;
                if(difficulty==="normal") s*=Math.random();

                if(s>best){best=s;move=[i,j];}
            }
        }
    }

    if(!move) return;

    playSound("O");

    let [r,c]=move;
    board[r][c]="O";
    last=[r,c];
    saveGame();
    updateUI();

    let win=checkWin(r,c,"O");
    if(win) return endGame(win,"O");

    current="X";
    updateStatus();
}

// ===== AI LOGIC =====
function evaluate(r,c){
    return scoreLine(r,c,"O")*2 + scoreLine(r,c,"X")*3 + center(r,c);
}

function center(r,c){
    let m=SIZE/2;
    return 10-Math.abs(r-m)-Math.abs(c-m);
}

function scoreLine(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1,open=0;

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{ if(board[nr]?.[nc]=="") open++; break;}
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{ if(board[nr]?.[nc]=="") open++; break;}
        }

        if(count>=5) total+=100000;
        else if(count==4&&open==2) total+=50000;
        else if(count==4) total+=10000;
        else if(count==3&&open==2) total+=5000;
        else if(count==3) total+=1000;
        else if(count==2) total+=200;
    }

    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let cells=[[r,c]];

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) cells.push([nr,nc]); else break;
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) cells.unshift([nr,nc]); else break;
        }

        if(cells.length>=5) return cells;
    }
    return null;
}

// ===== END =====
function endGame(cells,p){
    gameOver=true;
    winS.play();

    cells.forEach(([r,c])=>{
        document.querySelector(`.cell[data-r='${r}'][data-c='${c}']`)
        .classList.add("win");
    });

    if(p==="X") score.win++;
    else score.lose++;

    updateScore();
    setTimeout(()=>alert(p+" thắng!"),200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
        cell.classList.remove("last");

        if(last && r==last[0] && c==last[1]){
            cell.classList.add("last");
        }
    });
}

function updateStatus(){
    statusDiv.innerText="Lượt: "+current+" | Mode: "+mode+" | Level: "+difficulty;
}

function updateScore(){
    scoreDiv.innerText=`🏆 Thắng:${score.win} | Thua:${score.lose}`;
}

// ===== SAVE =====
function saveGame(){
    localStorage.setItem("board",JSON.stringify(board));
}

// ===== SOUND =====
function playSound(p){
    if(p==="X"){sX.currentTime=0;sX.play();}
    else{sO.currentTime=0;sO.play();}
}

// ===== RESET =====
function reset(){
    localStorage.removeItem("board");
    init();
}

init();
</script>

</body>
</html>
