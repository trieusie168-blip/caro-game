<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CARO AI FINAL+</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    no-repeat center/cover;
}

h1{text-shadow:2px 2px 5px black;}

#board{
    display:grid;
    grid-template-columns:repeat(30,22px);
    gap:2px;
    justify-content:center;
}

.cell{
    width:22px;height:22px;
    background:rgba(0,0,0,0.6);
    line-height:22px;
    cursor:pointer;
}

.cell:hover{background:#555;}
.last{background:yellow !important;}
.win{background:lime !important;}

button{margin:5px;padding:6px;}
</style>
</head>

<body>

<h1>🤖 CARO AI</h1>

<input id="name" placeholder="Tên bạn">
<button onclick="start()">Start</button>

<br>

<button onclick="setMode('AI')">AI</button>
<button onclick="setMode('2P')">2 Người</button>

<br>

<button onclick="setLevel('easy')">Dễ</button>
<button onclick="setLevel('normal')">BT</button>
<button onclick="setLevel('hard')">Khó</button>

<br>

<b>Chọn lượt:</b>
<button onclick="setPlayerSide('X')">Đi trước (X)</button>
<button onclick="setPlayerSide('O')">Đi sau (O)</button>

<br>

<button onclick="reset()">Reset</button>

<div id="info"></div>
<div id="board"></div>

<script>
const SIZE=30;

let board=[],current="X",mode="AI",difficulty="normal";
let last=null,gameOver=false,player="";
let playerSide="X"; // X = đi trước, O = đi sau

const boardDiv=document.getElementById("board");
const info=document.getElementById("info");

// ===== START =====
function start(){
    player=document.getElementById("name").value||"Người chơi";
    init();
}

// ===== INIT =====
function init(){
    board=Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
    boardDiv.innerHTML="";
    gameOver=false;

    current = "X"; // luôn bắt đầu từ X

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=i;
            cell.dataset.c=j;
            cell.onclick=()=>move(i,j);
            boardDiv.appendChild(cell);
        }
    }

    updateInfo();

    // Nếu người chơi chọn O → AI đi trước
    if(mode==="AI" && playerSide==="O"){
        setTimeout(aiMove,400);
    }
}

// ===== SET =====
function setMode(m){mode=m;}
function setLevel(l){difficulty=l;}
function setPlayerSide(s){playerSide=s;}

// ===== MOVE =====
function move(r,c){
    if(board[r][c]!==""||gameOver) return;

    // Nếu chơi AI, chỉ cho click khi tới lượt mình
    if(mode==="AI" && current!==playerSide) return;

    place(r,c,current);

    let win=checkWin(r,c,current);
    if(win) return end(win,current);

    if(mode==="2P"){
        current=current==="X"?"O":"X";
    }else{
        current = (current==="X")?"O":"X";
        setTimeout(aiMove,300);
    }

    updateInfo();
}

// ===== PLACE =====
function place(r,c,p){
    board[r][c]=p;
    last=[r,c];
    updateUI();
}

// ===== AI =====
function aiMove(){

    if(gameOver) return;

    let moves=[];

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]===""){
                moves.push({
                    r:i,
                    c:j,
                    score:evaluate(i,j)
                });
            }
        }
    }

    if(moves.length===0) return;

    // thắng ngay
    for(let m of moves){
        board[m.r][m.c]="O";
        if(checkWin(m.r,m.c,"O")){
            board[m.r][m.c]="";
            return placeAI(m);
        }
        board[m.r][m.c]="";
    }

    // chặn ngay
    for(let m of moves){
        board[m.r][m.c]="X";
        if(checkWin(m.r,m.c,"X")){
            board[m.r][m.c]="";
            return placeAI(m);
        }
        board[m.r][m.c]="";
    }

    moves.sort((a,b)=>b.score-a.score);

    if(difficulty==="easy"){
        return placeAI(moves[Math.floor(Math.random()*moves.length)]);
    }

    if(difficulty==="normal"){
        let top=moves.slice(0,5);
        return placeAI(top[Math.floor(Math.random()*top.length)]);
    }

    return placeAI(moves[0]);
}

// ===== AI SUPPORT =====
function placeAI(m){
    place(m.r,m.c,"O");

    let win=checkWin(m.r,m.c,"O");
    if(win) return end(win,"O");

    current="X";
    updateInfo();
}

// ===== AI LOGIC =====
function evaluate(r,c){
    return score(r,c,"O")*2 + score(r,c,"X")*3;
}

function score(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];
    let total=0;

    for(let [dr,dc] of dirs){
        let count=1,open=0;

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) count++;
            else{
                if(board[nr]?.[nc]=="") open++;
                break;
            }
        }

        if(count>=5) total+=1000000;
        else if(count==4 && open==2) total+=200000;
        else if(count==4) total+=50000;
        else if(count==3 && open==2) total+=20000;
        else if(count==3) total+=5000;
        else if(count==2) total+=1000;
    }

    return total;
}

// ===== WIN =====
function checkWin(r,c,p){
    let dirs=[[0,1],[1,0],[1,1],[1,-1]];

    for(let [dr,dc] of dirs){
        let cells=[[r,c]];

        for(let i=1;i<5;i++){
            let nr=r+dr*i,nc=c+dc*i;
            if(board[nr]?.[nc]==p) cells.push([nr,nc]);
            else break;
        }

        for(let i=1;i<5;i++){
            let nr=r-dr*i,nc=c-dc*i;
            if(board[nr]?.[nc]==p) cells.unshift([nr,nc]);
            else break;
        }

        if(cells.length>=5) return cells;
    }
    return null;
}

// ===== END =====
function end(cells,p){
    gameOver=true;

    cells.forEach(([r,c])=>{
        document.querySelector(`.cell[data-r='${r}'][data-c='${c}']`)
        .classList.add("win");
    });

    setTimeout(()=>{
        if(mode==="AI"){
            if(p===playerSide) alert(player+" thắng!");
            else alert("AI thắng!");
        }else{
            alert(p+" thắng!");
        }
    },200);
}

// ===== UI =====
function updateUI(){
    document.querySelectorAll(".cell").forEach(cell=>{
        let r=cell.dataset.r,c=cell.dataset.c;
        cell.innerText=board[r][c];
        cell.classList.remove("last");

        if(last && r==last[0] && c==last[1]){
            cell.classList.add("last");
        }
    });
}

function updateInfo(){
    info.innerText=
        player+" | Mode:"+mode+
        " | Level:"+difficulty+
        " | Bạn chơi:"+playerSide+
        " | Lượt:"+current;
}

// ===== RESET =====
function reset(){init();}
</script>

</body>
</html>
